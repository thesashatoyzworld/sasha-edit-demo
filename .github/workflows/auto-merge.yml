name: auto-merge
# Авто-подтверждение правок: как только Claude открывает PR — он сразу
# вливается в main, и Vercel выкатывает сайт. Клиенту не надо жать "Merge".
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
permissions:
  contents: write
  pull-requests: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --repo "$REPO" --merge --admin --delete-branch
