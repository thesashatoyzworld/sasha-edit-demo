<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Саша Тойз — упаковка смысла</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #1a1814;
      --muted: #6b6b6b;
      --accent: #ff6a2b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      font-family: -apple-system, system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1.05;
      font-weight: 400;
      margin-bottom: 22px;
    }
    h1 em { color: var(--accent); font-style: italic; }
    p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--bg);
      background: var(--accent);
      padding: 15px 32px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform .15s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .foot {
      margin-top: 48px;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Саша Тойз</div>
    <h1>Упаковываю экспертов <em>под ключ</em></h1>
    <p>Помогаю экспертам собрать упаковку, которая продаёт без надрыва и без танцев в сторис.</p>
    <a class="btn" href="https://t.me/thesashatoyz">Написать в Telegram</a>
    <div class="foot">© 2026 · thesashatoyz</div>
  </main>
</body>
</html>
